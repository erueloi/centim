name: Deploy to Firebase

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # flutter-version: '3.19.0' # Use latest stable 

      - name: Decode Secrets
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          FIREBASE_OPTIONS_DART_BASE64: ${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART_BASE64" | base64 --decode > lib/firebase_options.dart
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Create .env file
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env

      # --- Cloud Functions (Enable Banking proxy) + regles de Firestore ---
      # Es despleguen ABANS del hosting perquè l'app web nova pugui dependre'n.
      - name: Setup Node (Cloud Functions)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create functions/.env (paràmetres, NO secrets)
        env:
          ENABLEBANKING_ENV: ${{ vars.ENABLEBANKING_ENV }}
          ASPSP_NAME: ${{ vars.ASPSP_NAME }}
          ASPSP_COUNTRY: ${{ vars.ASPSP_COUNTRY }}
        run: |
          # La clau .pem i l'APP_ID viuen a Secret Manager, no aquí. Aquests són
          # només paràmetres de configuració (quin entorn i quin banc).
          # Guarda de seguretat: si no estan definits com a Repository variables,
          # avortem. Desplegar amb els defaults faria servir SANDBOX i trencaria
          # la connexió de producció de forma silenciosa.
          if [ -z "$ENABLEBANKING_ENV" ] || [ -z "$ASPSP_NAME" ]; then
            echo "::error::Falten les Repository variables ENABLEBANKING_ENV i/o ASPSP_NAME (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          {
            echo "ENABLEBANKING_ENV=$ENABLEBANKING_ENV"
            echo "ASPSP_NAME=$ASPSP_NAME"
            echo "ASPSP_COUNTRY=${ASPSP_COUNTRY:-ES}"
          } > functions/.env
          echo "functions/.env generat (env=$ENABLEBANKING_ENV, aspsp=$ASPSP_NAME)"

      - name: Install Cloud Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Cloud Functions & Firestore rules
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CENTIM_162BD }}
        run: |
          # Reutilitzem el service account del deploy de hosting. Ha de tenir
          # permisos per a Functions i Firestore rules (vegeu README/notes).
          echo "$FIREBASE_SA" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx --yes firebase-tools@latest deploy \
            --only functions,firestore:rules \
            --project centim-162bd \
            --non-interactive
          rm -f "$RUNNER_TEMP/firebase-sa.json"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build Web (Release)
        run: flutter build web --release --no-tree-shake-icons

      - name: Prepare Hosting Artifacts
        run: |
          # Copy APK to web folder
          cp build/app/outputs/flutter-apk/app-release.apk build/web/centim.apk
          
          # Extract version from tag (e.g. v1.0.2 -> 1.0.2)
          # If triggered manually without tag, fallback to 'latest'
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$GITHUB_REF" != "refs/tags/"* ]]; then
            VERSION="latest"
          fi
          
          echo "Generating version.json for version: $VERSION"
          
          # JSON content
          echo "{\"version\": \"$VERSION\", \"apkUrl\": \"https://centim-162bd.web.app/centim.apk\"}" > build/web/version.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CENTIM_162BD }}
          channelId: live
          projectId: centim-162bd
